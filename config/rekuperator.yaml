substitutions:
  device_name: rekuperator

esphome:
  name: rekuperator
  friendly_name: "Przekaznik Rekuperatora"

esp8266:
  board: esp8285

packages:
  device: !include .sonoff_minir2.yaml
  common: !include .common.yaml

#######################################
# Device specific Config Begins Below #
#######################################

fan:
  - id: reku_1
    platform: binary
    output: relay_1
    name: "Rekuperator"    

binary_sensor:
  - id: !extend button_1
    filters:
      - invert:
      - delayed_off: 50ms
    on_press:
      - fan.toggle:
          id: reku_1
