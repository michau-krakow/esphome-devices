
esphome:
  comment: "Sonoff MiniR2"

esp8266:
  board: esp8285

#######################################
# Device specific Config Begins Below #
#######################################

status_led:
  pin:
    number: GPIO13
    inverted: true

output:
  # Physical relay on GPIO12
  - id: relay_1
    platform: gpio
    pin: GPIO12

binary_sensor:
  # Local button
  - id: button_1
    platform: gpio
    pin: GPIO00

  # External switch input (S1)
  - id: switch_s1
    platform: gpio
    pin: GPIO04
