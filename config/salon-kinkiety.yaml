substitutions:
  device_name: salon-kinkiety

esphome:
  name: ${device_name}
  friendly_name: Kinkiety w salonie
  comment: OXT 2-ch dimmer

bk72xx:
  board: cb3s

packages:
  common: !include .common.yaml

# Disable UART logging - we need UART to talk to dimming MCU
logger:
  baud_rate: 0

uart:
  tx_pin: GPIO11 # CB3S module
  baud_rate: 9600

light:
  - platform: oxt_dimmer
    channels:
    - name: lampa1
      id: lampa1
      min_value: 50
      default_transition_length: 0.5s
      sensing_pin:
        number: GPIO08  # CB3S module
        inverted: true
        mode: input_pullup
    - name: lampa2
      id: lampa2
      min_value: 50
      sensing_pin:
        number: GPIO09  # CB3S module
        inverted: true
        mode: input_pullup

status_led:
  pin:
    number: GPIO06
    inverted: true

binary_sensor:
  - platform: gpio
    pin: GPIO24
    id: button1
    filters:
      - invert:
      - delayed_off: 50ms
    on_press:
      - light.toggle:
          id: lampa1
      - light.toggle:
          id: lampa2
