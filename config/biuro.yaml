substitutions:
  device_name: biuro

esphome:
  name: ${device_name}
  friendly_name: Pokój biurowy taty
  comment: OXT 1-ch dimmer

bk72xx:
  board: cb3s

packages:
  common: !include .common.yaml

# Disable UART logging - we need UART to talk to dimming MCU
logger:
  baud_rate: 0

uart:
  tx_pin: GPIO11  # CB3S module
  baud_rate: 9600

light:
  - platform: oxt_dimmer
    channels:
    - name: lampa
      id: lampa
      default_transition_length: 1s
      sensing_pin:
        number: GPIO08 # CB3S module
        inverted: true
        mode: input_pullup

status_led:
  pin:
    number: GPIO06
    inverted: true

binary_sensor:
  - platform: gpio
    pin: GPIO24
    id: button1
    filters:
      - invert:
      - delayed_off: 50ms
    on_press:
      - light.toggle:
          id: lampa
