substitutions:
  device_name: sonoffminir2_1

esphome:
  name: sonoff-minir2
  comment: "Sonoff MiniR2"

# esp8266:
#   board: esp01_1m
esp8266:
  board: esp8285

packages:
  common: !include .common.yaml

#######################################
# Device specific Config Begins Below #
#######################################

status_led:
  pin:
    number: GPIO13
    inverted: true

binary_sensor:
  - platform: gpio
    pin: GPIO00
    id: reset
    # internal: true
    filters:
      - invert:
      - delayed_off: 10ms
    on_press:
      - switch.toggle:
          id: relay_1

  - platform: gpio
    name: ${device_name}_status
    pin: GPIO04
    id: switch_1
    filters:
      - invert:
      - delayed_off: 10ms
    on_press:
      then:
        - switch.toggle:
            id: relay_1

switch:
  - platform: gpio
    name: ${device_name}_switch
    icon: "mdi:lightbulb_outline"
    pin: GPIO12
    id: relay_1
    restore_mode: restore_default_off

