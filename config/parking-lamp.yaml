substitutions:
  device_name: parking-lamp

esphome:
  name: parking-lamp
  friendly_name: "Parking Lamp"
  comment: "Sonoff MiniR2"

esp8266:
  board: esp8285

packages:
  common: !include .common.yaml

#######################################
# Device specific Config Begins Below #
#######################################

status_led:
  pin:
    number: GPIO13
    inverted: true

output:
  # Physical relay on GPIO
  - platform: gpio
    pin: GPIO12
    id: relay_1

light:
  - platform: binary
    id: light_1
    name: ${device_name}
    icon: mdi:spotlight-beam
    restore_mode: restore_default_off
    output: relay_1

binary_sensor:
  - platform: gpio
    pin: GPIO00
    id: button_1
    filters:
      - invert:
      - delayed_off: 50ms
    on_press:
      - light.toggle:
          id: light_1

