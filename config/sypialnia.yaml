substitutions:
  device_name: sypialnia
  friendly_name: Sypialnia

esphome:
  name: ${device_name}
  friendly_name: "${friendly_name}"

packages:
  device: !include .sonoff_minir4_extreme.yaml
  common: !include .common.yaml
  xiaomi1: !include
    file: .xiaomi-lywsd03mmc
    vars:
      xiaomi_friendly_name:  Sypialnia
      xiaomi_name: sypialnia
  xiaomi2: !include
    file: .xiaomi-lywsd03mmc
    vars:
      xiaomi_friendly_name:  Biuro
      xiaomi_name: biuro
  xiaomi3: !include
    file: .xiaomi-lywsd03mmc
    vars:
      xiaomi_friendly_name:  Lazienka
      xiaomi_name: lazienka
