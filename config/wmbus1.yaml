substitutions:
  device_name: wmbus

esphome:
  name: wmbus1
  comment: "WMBUS meter reader - wodomierz"

esp8266:
  board: d1_mini  # WeMos D1 Mini, esp-12f, 4MB flash

packages:
  common: !include .common.yaml
  meter1a: !include
    file: .wmbus-sensor.yaml
    vars:
      meter_id: '0xB8DAF9'    # Wodomierz glowny
  meter1b: !include
    file: .wmbus-sensor.yaml
    vars:
      meter_id: '0x416E67BE'  # Wodomierz ogrod
